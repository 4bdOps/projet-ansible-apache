---
- name: Installation et configuration d'Apache
  hosts: webservers
  become: yes  # Permet d'exécuter les commandes en tant que super-utilisateur (sudo)

  tasks:
    - name: Installation du paquet Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: S'assurer qu'Apache est démarré et activé au boot
      service:
        name: apache2
        state: started
        enabled: yes
